<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parklawn Sign Generator</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="shortcut icon" type="image/x-icon" href="icons/logo.png"/>
</head>
<body>

    <!-- Upload Screen -->
    <div id="upload-screen" class="screen active">
        <div class="upload-box">
            <div class="brand">
                <h1>Parklawn Sign Generator</h1>
                <p class="description">Upload a meet sheet PDF to automatically extract swimmers and generate pool deck signs.</p>
            </div>
            
            <div class="upload-zone">
                <input type="file" id="pdf-input" accept="application/pdf" class="hidden" />
                <button type="button" class="btn btn-primary btn-large" onclick="document.getElementById('pdf-input').click();">
                    Select Meet Sheet PDF
                </button>
            </div>
            
            <div id="progress-container" class="progress-container hidden">
                <div class="progress-bar">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <div id="progress-text" class="progress-text">Preparing extraction...</div>
            </div>
        </div>
    </div>

    <!-- Editor Screen -->
    <div id="editor-screen" class="screen">
        <header id="header-bar">
            <div class="header-left">
                <div class="header-title-group">
                    <input type="text" id="meet-info-input" placeholder="Meet Title & Date" value="Parklawn Sign Generator" oninput="updateMeetInfo(this.value)" />
                    <span id="swimmer-count-badge" class="badge">0 Swimmers</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" onclick="addBlankSign();">
                    Add Swimmer
                </button>
                <button class="btn btn-primary" id="export-pdf-btn" onclick="exportToPDF();">
                    Export PDF
                </button>
            </div>
        </header>

        <!-- Horizontal Editor Scrolling Viewport -->
        <main id="editor-viewport" class="editor-viewport">
            <!-- Swimmer Cards will be injected here dynamically -->
        </main>
    </div>

    <!-- Hidden Print Container -->
    <div id="print-container"></div>

    <!-- App Logic -->
    <script type="module" src="/app.js"></script>
</body>
</html>
